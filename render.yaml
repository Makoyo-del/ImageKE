services:
  # ─── Backend API ─────────────────────────────────────────────────────────────
  - type: web
    name: imageke-api
    env: node
    plan: starter
    rootDir: server           # Render runs npm install inside ./server/
    buildCommand: npm install
    startCommand: node index.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000          # Render always uses port 10000 internally
      - key: PAYSTACK_SECRET_KEY
        sync: false           # Set manually in the Render Dashboard → Environment
      - key: ALLOWED_ORIGINS
        value: https://imageke.com,https://imageke-frontend.onrender.com

  # ─── Frontend (Static Site) ──────────────────────────────────────────────────
  - type: static
    name: imageke-frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://imageke-api.onrender.com
      - key: VITE_PAYSTACK_PUBLIC_KEY
        sync: false           # Set manually in the Render Dashboard → Environment
