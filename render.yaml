services:
  - type: web
    name: imageke
    runtime: node
    plan: starter
    buildCommand: npm install && npm run build && cd server && npm install
    startCommand: node server/index.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: PAYSTACK_SECRET_KEY
        sync: false
      - key: VITE_PAYSTACK_PUBLIC_KEY
        sync: false
