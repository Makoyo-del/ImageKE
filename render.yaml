services:
  # ─── Backend API (Node.js Web Service) ───────────────────────────────────────
  - type: web
    name: imageke-api
    runtime: node
    plan: starter
    rootDir: server
    buildCommand: npm install
    startCommand: node index.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: PAYSTACK_SECRET_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        value: https://imageke.com,https://imageke-frontend.onrender.com

  # ─── Frontend (Static Site) ──────────────────────────────────────────────────
  - type: web
    name: imageke-frontend
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://imageke-api.onrender.com
      - key: VITE_PAYSTACK_PUBLIC_KEY
        sync: false
