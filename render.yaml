services:
  - type: web
    name: imageke-api
    runtime: node
    plan: starter
    rootDir: server
    buildCommand: npm install
    startCommand: node index.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: PAYSTACK_SECRET_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        value: https://imageke.com,https://www.imageke.com
